name: Skrivbord
options:
  deploymentTarget:
    macOS: "13.0"
  bundleIdPrefix: name.clg
targets:
  Skrivbord:
    type: application
    platform: macOS
    sources:
      - path: Sources/Skrivbord
      - path: Resources/AppIcon.icon
        buildPhase: resources
      - path: Resources/MenuBarIcon.png
        buildPhase: resources
      - path: Resources/MenuBarIcon@2x.png
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: name.clg.Skrivbord
        PRODUCT_NAME: Skrivbord
        DEVELOPMENT_TEAM: 9CNN5DQ656
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/Skrivbord.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
